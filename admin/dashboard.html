<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SY 兒童手作教室 · 後台</title>
<style>
/* ── 基礎 Reset ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --clay-rose:#C4A29E;--clay-sage:#9AAF9F;--clay-sand:#C2B49A;
  --clay-rose-light:#EFE4E2;--clay-sage-light:#E3EDE5;--clay-sand-light:#EDE6DB;
  --clay-rose-mid:#D4B8B4;--clay-sage-mid:#B5C9BA;--clay-sand-mid:#D4C8B4;
  --clay-text-rose:#6B4845;--clay-text-sage:#3A5440;--clay-text-sand:#5C4E38;
  --bg:#fff;--bg2:#f8f7f5;--bg3:#f2f0ec;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --red-light:#fce8e8;--red:#a32d2d;
  --amber-light:#faeeda;--amber:#854f0b;
  --green-light:#eaf3de;--green:#3b6d11;
  --radius-md:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg3);color:var(--text);}
.shell{display:flex;min-height:100vh;}

/* ── Sidebar ──────────────────────────────────── */
.sb{width:150px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:10px 0;gap:2px;flex-shrink:0;}
.si{height:36px;border-radius:var(--radius-md);display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);padding:0 12px;white-space:nowrap;transition:background .15s;}
.si .si-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.si .si-label{overflow:hidden;text-overflow:ellipsis;}
.si.on{background:var(--clay-sage-light);color:var(--clay-text-sage);font-weight:500;}
.si:hover:not(.on){background:var(--bg2);}
.sdiv{height:0.5px;background:var(--border);margin:4px 12px;}
@media(max-width:600px){
  .sb{width:52px;align-items:center;padding:10px 0;}
  .si{width:36px;padding:0;justify-content:center;gap:0;font-size:15px;}
  .si .si-label{display:none;}
  .si .si-icon{font-size:15px;width:auto;}
  .sdiv{width:28px;margin:4px 0;}
}

/* ── Main layout ─────────────────────────────── */
.main{flex:1;overflow:auto;padding:16px;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.topbar h2{font-size:15px;font-weight:500;}

/* ── Cards ───────────────────────────────────── */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:12px;}
.cardtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ct{font-size:12px;font-weight:500;color:var(--text2);}

/* ── Stats grid ──────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat{background:var(--bg2);border-radius:var(--radius-md);padding:10px 12px;}
.sl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.sv{font-size:20px;font-weight:500;color:var(--text);}
.sv.w{color:var(--amber);}.sv.r{color:var(--red);}

/* ── Rows ────────────────────────────────────── */
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.row:last-child{border-bottom:none;}
.rname{font-size:13px;font-weight:500;}
.rsub{font-size:11px;color:var(--text2);}
.ml{margin-left:auto;}

/* ── Avatar ──────────────────────────────────── */
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
/* 顏色輪替（最多10色）*/
.av.c0{background:var(--clay-sage-light);color:var(--clay-text-sage);}
.av.c1{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.av.c2{background:var(--clay-sand-light);color:var(--clay-text-sand);}
.av.c3{background:#FAEEDA;color:#854F0B;}
.av.c4{background:#EEEDFE;color:#3C3489;}

/* ── Badges ──────────────────────────────────── */
.badge{font-size:10px;border-radius:4px;padding:2px 6px;white-space:nowrap;}
.badge.r{background:var(--red-light);color:var(--red);}
.badge.y{background:var(--amber-light);color:var(--amber);}
.badge.g{background:var(--green-light);color:var(--green);}
.badge.t{background:var(--clay-sage-light);color:var(--clay-text-sage);}

/* ── Tags ────────────────────────────────────── */
.tag{display:inline-block;font-size:10px;border-radius:4px;padding:2px 5px;margin-right:2px;}
.tag.t{background:var(--clay-sage-light);color:var(--clay-text-sage);}
.tag.pk{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.tag.s{background:var(--clay-sand-light);color:var(--clay-text-sand);}

/* ── Progress bar ────────────────────────────── */
.pbar-wrap{display:flex;align-items:center;gap:8px;}
.pbar{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--clay-sage);border-radius:2px;}

/* ── Loading / Error states ──────────────────── */
.loading{text-align:center;padding:20px;font-size:12px;color:var(--text3);}
.err-msg{background:var(--red-light);color:var(--red);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;margin-bottom:10px;}

/* ── Refresh button ──────────────────────────── */
.refresh-btn{background:transparent;border:0.5px solid var(--clay-sage-mid);border-radius:var(--radius-md);color:var(--clay-sage);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.refresh-btn:hover{background:var(--clay-sage-light);}

/* ── 2 週行事曆 ─────────────────────────────── */
.cal-header{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.cal-nav-btn{width:28px;height:28px;border:0.5px solid var(--border2);background:var(--bg);border-radius:6px;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit;}
.cal-nav-btn:hover{background:var(--bg2);color:var(--text);}
.cal-range{font-size:12px;color:var(--text);padding:0 6px;font-weight:500;}
.cal-today-btn{margin-left:auto;font-size:11px;padding:4px 10px;border:0.5px solid var(--clay-sage-mid);background:transparent;color:var(--clay-sage);border-radius:6px;cursor:pointer;font-family:inherit;}
.cal-today-btn:hover{background:var(--clay-sage-light);}

.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;}
.cal-day{background:var(--bg2);border-radius:var(--radius-md);padding:8px 6px 6px;min-height:140px;border:0.5px solid var(--border);display:flex;flex-direction:column;}
.cal-day.today{background:#EEEDFE;border-color:#8f87e8;}
.cal-day-head{text-align:center;margin-bottom:6px;}
.cal-day-title{font-size:11px;font-weight:500;color:var(--text);}
.cal-day-date{font-size:10px;color:var(--text2);margin-top:1px;}
.cal-day-count{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:3px 8px;border-radius:999px;margin-top:4px;background:var(--bg3);color:var(--text3);}
.cal-day-count.active{background:#2d2c3a;color:#fff;}
.cal-day.today .cal-day-count.active{background:#5d56c8;}
.cal-day-body{flex:1;display:flex;flex-direction:column;gap:4px;}
.cal-card{background:var(--bg);border-radius:4px;padding:5px 6px;border-left:2px solid var(--clay-sage);cursor:pointer;transition:background .15s;}
.cal-card:hover{background:var(--bg2);}
.cal-card.theme{border-left-color:var(--clay-rose);}
.cal-card-top{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.cal-card-type{font-size:9px;display:inline-block;padding:1px 5px;border-radius:3px;background:var(--clay-sage-light);color:var(--clay-text-sage);white-space:nowrap;}
.cal-card.theme .cal-card-type{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.cal-card-time{font-size:10px;color:var(--text);display:inline-flex;align-items:center;gap:2px;white-space:nowrap;}
.cal-card-count{font-size:9px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:3px;}
.cal-card-detail{overflow:hidden;max-height:0;transition:max-height .25s ease;margin-top:0;}
.cal-card-detail.open{max-height:200px;margin-top:4px;}
.cal-card-detail-inner{display:flex;flex-wrap:wrap;gap:2px;padding-top:3px;border-top:0.5px solid var(--border);}
.cal-card-child{font-size:9px;padding:2px 5px;border-radius:3px;background:var(--clay-sand-light);color:var(--clay-text-sand);}
.cal-day-empty{text-align:center;font-size:10px;color:var(--text3);flex:1;display:flex;align-items:center;justify-content:center;border:1px dashed var(--border2);border-radius:4px;margin-top:2px;}

@media(max-width:900px){
  .cal-grid{grid-template-columns:repeat(7,minmax(74px,1fr));overflow-x:auto;}
  .cal-day{min-height:130px;}
}
</style>

<script>
// ============================================================
// ★ 教室設定 ── 換教室時只需修改這裡 ★
// ============================================================
const CONFIG = {
  // ↓↓↓ 貼上你的 GAS Web App 網址 ↓↓↓
  GAS_URL: "https://script.google.com/macros/s/AKfycbw6PBIUdHTzKBBdbQbRcU-za2rJQtBL6ZEjvJI6z1-NN1ziW1gjTafSdcx8U0E_eRHR/exec",

  NOTION_DB_CHILD:    "338c38a5-6efe-802c-9ea8-edd4375e28c5",
  NOTION_DB_PURCHASE: "338c38a5-6efe-803f-8779-d55a13c35548",
  NOTION_DB_SESSION:  "338c38a5-6efe-80a0-9801-d9517c8431ef",
  NOTION_DB_THEME:    "338c38a5-6efe-80eb-9cda-e51fcb0f34c3",
  NOTION_DB_PARENT:   "338c38a5-6efe-8061-b4f3-fca2a7cb4394",

  LOW_LESSON_THRESHOLD: 1,
  DISMISS_DAYS: 30,
};
// ============================================================

// ── GAS Proxy API 工具函式 ─────────────────────────────────

// ── Notion 查詢快取（sessionStorage, TTL 60 秒） ─────────────
const NOTION_CACHE_TTL_MS = 60 * 1000;
function _cacheKey(dbId, filter, sorts) {
  return "nq:" + dbId + ":" + JSON.stringify(filter || null) + ":" + JSON.stringify(sorts || null);
}
function _cacheGet(key) {
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return null;
    const { t, v } = JSON.parse(raw);
    if (Date.now() - t > NOTION_CACHE_TTL_MS) { sessionStorage.removeItem(key); return null; }
    return v;
  } catch (e) { return null; }
}
function _cacheSet(key, value) {
  try { sessionStorage.setItem(key, JSON.stringify({ t: Date.now(), v: value })); }
  catch (e) { /* quota exceeded - ignore */ }
}
function clearNotionCache() {
  try {
    for (let i = sessionStorage.length - 1; i >= 0; i--) {
      const k = sessionStorage.key(i);
      if (k && k.startsWith("nq:")) sessionStorage.removeItem(k);
    }
  } catch (e) {}
}
async function notionQuery(dbId, filter = null, sorts = null) {
  const key = _cacheKey(dbId, filter, sorts);
  const cached = _cacheGet(key);
  if (cached) return cached;
  const url = new URL(CONFIG.GAS_URL);
  url.searchParams.set("action", "query");
  url.searchParams.set("db", dbId);
  if (filter) url.searchParams.set("filter", JSON.stringify(filter));
  if (sorts) url.searchParams.set("sorts", JSON.stringify(sorts));
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error("GAS 回應錯誤: " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "未知錯誤");
  _cacheSet(key, data.results);
  return data.results;
}

// ── 計算剩餘堂數 ────────────────────────────────────────────

/**
 * 計算某個孩子的剩餘堂數
 * 公式：所有 Purchase 購買堂數加總 - 所有 Session 扣除堂數加總
 * @param {string} childId  Child 頁面 ID
 * @returns {Promise<{purchased, used, remaining}>}
 */
async function calcLessons(childId) {
  // 查詢此孩子的所有購買記錄
  // Purchase 表中 "Child" 欄位（relation）包含此孩子 ID
  const purchases = await notionQuery(CONFIG.NOTION_DB_PURCHASE, {
    property: "Child",
    relation: { contains: childId },
  });

  const purchased = purchases.reduce((sum, p) => {
    return sum + (p.properties["購買堂數"]?.number || 0);
  }, 0);

  // 查詢此孩子出席的所有課程
  // Session 表中 "出席孩子" 欄位（relation）包含此孩子 ID
  const sessions = await notionQuery(CONFIG.NOTION_DB_SESSION, {
    property: "出席孩子",
    relation: { contains: childId },
  });

  const used = sessions.reduce((sum, s) => {
    // 若課程沒有填扣除堂數，預設為 1
    return sum + (s.properties["扣除堂數"]?.number ?? CONFIG.LOW_LESSON_THRESHOLD ?? 1);
  }, 0);

  return { purchased, used, remaining: purchased - used };
}

// ── 日期工具 ─────────────────────────────────────────────────

/** 取得今天的 YYYY-MM-DD 字串（台灣時區）*/
function today() {
  return new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 取得 N 天後的 YYYY-MM-DD 字串 */
function daysLater(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 取得本週一的 YYYY-MM-DD 字串 */
function thisMonday() {
  const d = new Date();
  const day = d.getDay(); // 0=日, 1=一...
  const diff = day === 0 ? -6 : 1 - day; // 讓週日往前推到上週一
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 取得本月第一天的 YYYY-MM-DD 字串 */
function thisMonthStart() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-01`;
}

/** 將 YYYY-MM-DD 轉成中文日期（含星期） */
function formatDate(str) {
  if (!str) return "";
  const d = new Date(str + "T00:00:00+08:00");
  const weekDays = ["日","一","二","三","四","五","六"];
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const w = weekDays[d.getDay()];
  return `${m}/${day}（週${w}）`;
}

// ── 頭像顏色輪替 ─────────────────────────────────────────────
const AV_COLORS = ["c0","c1","c2","c3","c4"];
function avColor(index) { return AV_COLORS[index % AV_COLORS.length]; }

/** 取孩子名稱第一個字當頭像文字 */
function avText(name) { return name ? name[0] : "?"; }



// ── 儀表板主要載入函式 ───────────────────────────────────────

async function loadDashboard() {
  // 重置 loading 狀態
  ["reg-loading","theme-loading"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "";
  });
  ["cal-grid","theme-list"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = "";
  });
  ["theme-empty"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });
  ["stat-week","stat-purchase"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = "…";
  });

  // 兩個區塊平行載入，互不影響
  await Promise.all([
    loadStats(),
    loadRegistrations(),
    loadThemeEvents(),
  ]);
}

// ── 載入統計數字 ─────────────────────────────────────────────

async function loadStats() {
  try {
    // 本週課程數：日期 >= 本週一 且 <= 今天
    const weeklySessions = await notionQuery(CONFIG.NOTION_DB_SESSION, {
      and: [
        { property: "日期", date: { on_or_after: thisMonday() } },
        { property: "日期", date: { on_or_before: today() } },
      ]
    });
    document.getElementById("stat-week").textContent = weeklySessions.length;

    // 本月新購數：付款日期 >= 本月第一天
    const monthPurchases = await notionQuery(CONFIG.NOTION_DB_PURCHASE, {
      property: "付款日期",
      date: { on_or_after: thisMonthStart() },
    });
    document.getElementById("stat-purchase").textContent = monthPurchases.length;

  } catch (e) {
    console.error("loadStats 錯誤:", e);
    document.getElementById("stat-week").textContent = "!";
    document.getElementById("stat-purchase").textContent = "!";
  }
}



// ── 報名狀況：2 週行事曆狀態 ─────────────────────────────────
const calState = {
  startDate: null,   // 顯示區間第一天 (週一) YYYY-MM-DD
};

/** 計算指定日期所在週的週一（台灣時區） */
function mondayOf(dateStr) {
  const d = new Date(dateStr + "T00:00:00+08:00");
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 加 N 天 */
function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00+08:00");
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 格式化為 M/D */
function fmtMD(dateStr) {
  const d = new Date(dateStr + "T00:00:00+08:00");
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

/** 格式化為 YYYY/MM/DD */
function fmtYMD(dateStr) {
  const d = new Date(dateStr + "T00:00:00+08:00");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${d.getFullYear()}/${mm}/${dd}`;
}

function calPrev() { calState.startDate = addDays(calState.startDate, -14); loadRegistrations(); }
function calNext() { calState.startDate = addDays(calState.startDate, 14);  loadRegistrations(); }
function calGoToday() { calState.startDate = mondayOf(today()); loadRegistrations(); }

// ── 載入報名狀況（2 週行事曆）──────────────────────────────────

async function loadRegistrations() {
  const loadingEl = document.getElementById("reg-loading");
  const gridEl    = document.getElementById("cal-grid");
  const rangeEl   = document.getElementById("cal-range");

  // 初始化區間
  if (!calState.startDate) calState.startDate = mondayOf(today());

  const start = calState.startDate;
  const end   = addDays(start, 13);
  rangeEl.textContent = `${fmtYMD(start)} - ${fmtYMD(end)}`;

  gridEl.innerHTML = "";
  loadingEl.style.display = "";

  try {
    // 同時查詢區間內一般課程 + 主題課程 + 所有孩子
    const [sessions, themes, allChildren] = await Promise.all([
      notionQuery(CONFIG.NOTION_DB_SESSION, {
        and: [
          { property: "日期", date: { on_or_after:  start } },
          { property: "日期", date: { on_or_before: end   } },
        ]
      }),
      notionQuery(CONFIG.NOTION_DB_THEME, {
        and: [
          { property: "日期時間", date: { on_or_after:  start } },
          { property: "日期時間", date: { on_or_before: end   } },
        ]
      }),
      notionQuery(CONFIG.NOTION_DB_CHILD),
    ]);

    loadingEl.style.display = "none";

    // childId → name 對應表
    const childMap = {};
    allChildren.forEach(c => {
      childMap[c.id] = c.properties["暱稱"]?.title?.[0]?.text?.content || "未知";
    });

    // 將課程依 日期 + 時段 分組合併（同一天同一時段可能有多筆 session，視為同一堂課）
    // byDate[date][slotKey] = { type, timeSlot, title, childIds[], childNames[], isTheme }
    const byDate = {};

    // 一般課程（使用 relation 查名單）
    sessions.forEach(s => {
      const d = s.properties["日期"]?.date?.start || "";
      if (!d) return;
      const timeSlot = s.properties["時段"]?.rich_text?.[0]?.text?.content || "";
      const type     = s.properties["課程類型"]?.select?.name || "一般課程";
      const childArr = s.properties["出席孩子"]?.relation || [];

      if (!byDate[d]) byDate[d] = {};
      const key = "s:" + (timeSlot || "__no_time__");
      if (!byDate[d][key]) {
        byDate[d][key] = { type, timeSlot, title: "", childIds: [], childNames: [], isTheme: false };
      }
      childArr.forEach(r => {
        if (!byDate[d][key].childIds.includes(r.id)) {
          byDate[d][key].childIds.push(r.id);
        }
      });
      if (!byDate[d][key].type && type) byDate[d][key].type = type;
    });

    // 主題課程（使用 rich_text 逗號分隔名單）
    themes.forEach(t => {
      const raw = t.properties["日期時間"]?.date?.start || "";
      if (!raw) return;
      const d = raw.slice(0, 10);                       // YYYY-MM-DD
      const timeSlot = raw.length > 10
        ? new Date(raw).toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: "Asia/Taipei" })
        : "";
      const title    = t.properties["課程名稱"]?.title?.[0]?.text?.content || "主題課程";
      const listRaw  = t.properties["報名名單"]?.rich_text?.[0]?.text?.content || "";
      const names    = listRaw ? listRaw.split(",").map(s => s.trim()).filter(Boolean) : [];

      if (!byDate[d]) byDate[d] = {};
      const key = "t:" + t.id;
      byDate[d][key] = {
        type: "主題課程",
        timeSlot,
        title,
        childIds: [],
        childNames: names,
        isTheme: true,
      };
    });

    const todayStr = today();
    const weekDays = ["日","一","二","三","四","五","六"];

    // 渲染 14 個日格
    for (let i = 0; i < 14; i++) {
      const dateStr = addDays(start, i);
      const d = new Date(dateStr + "T00:00:00+08:00");
      const wd = weekDays[d.getDay()];
      const daySlots = byDate[dateStr] || {};
      const slotKeys = Object.keys(daySlots).sort(); // 依時段排序
      const totalCount = slotKeys.reduce((sum, k) => sum + daySlots[k].childIds.length, 0);
      const isToday = (dateStr === todayStr);

      const cell = document.createElement("div");
      cell.className = "cal-day" + (isToday ? " today" : "");

      const head = document.createElement("div");
      head.className = "cal-day-head";
      head.innerHTML = `
        <div class="cal-day-title">週${wd}</div>
        <div class="cal-day-date">${fmtMD(dateStr)}</div>
        <div class="cal-day-count ${totalCount > 0 ? "active" : "zero"}">
          <span>👥</span><span>共${totalCount}人</span>
        </div>
      `;
      cell.appendChild(head);

      const body = document.createElement("div");
      body.className = "cal-day-body";

      if (slotKeys.length === 0) {
        const empty = document.createElement("div");
        empty.className = "cal-day-empty";
        empty.textContent = "無排定課程";
        body.appendChild(empty);
      } else {
        slotKeys.forEach(key => {
          const slot = daySlots[key];
          const isTheme = !!slot.isTheme;
          // 一般課程用 childIds 對應名稱；主題課程已直接存名稱
          const childNames = isTheme
            ? slot.childNames
            : slot.childIds.map(id => childMap[id] || "?");
          const peopleCount = childNames.length;

          const card = document.createElement("div");
          card.className = "cal-card" + (isTheme ? " theme" : "");
          const titleHtml = isTheme && slot.title
            ? `<div style="font-size:10px;font-weight:500;color:var(--clay-text-rose);margin-top:3px;">${slot.title}</div>`
            : "";
          card.innerHTML = `
            <div class="cal-card-top">
              <span class="cal-card-type">${slot.type}</span>
              ${slot.timeSlot ? `<span class="cal-card-time">🕐 ${slot.timeSlot}</span>` : ""}
            </div>
            ${titleHtml}
            <div class="cal-card-count">報名人數 👥 <strong>${peopleCount}</strong> 人</div>
            <div class="cal-card-detail">
              <div class="cal-card-detail-inner">
                ${childNames.length > 0
                  ? childNames.map(n => `<span class="cal-card-child">${n}</span>`).join("")
                  : `<span style="font-size:9px;color:var(--text3);">尚無報名</span>`}
              </div>
            </div>
          `;
          // 點擊展開/收合報名者
          card.addEventListener("click", () => {
            const det = card.querySelector(".cal-card-detail");
            det.classList.toggle("open");
          });
          body.appendChild(card);
        });
      }

      cell.appendChild(body);
      gridEl.appendChild(cell);
    }

  } catch (e) {
    console.error("loadRegistrations 錯誤:", e);
    loadingEl.style.display = "";
    loadingEl.textContent = "⚠ 載入失敗：" + e.message;
  }
}

// ── 載入主題課程 ─────────────────────────────────────────────

async function loadThemeEvents() {
  const loadingEl = document.getElementById("theme-loading");
  const listEl    = document.getElementById("theme-list");
  const emptyEl   = document.getElementById("theme-empty");

  try {
    // 只載入報名狀態為「開放」的主題課程
    const themes = await notionQuery(CONFIG.NOTION_DB_THEME, {
      property: "報名狀態",
      select: { equals: "開放" },
    });

    loadingEl.style.display = "none";

    if (themes.length === 0) {
      emptyEl.style.display = "";
      return;
    }

    themes.forEach(t => {
      const name       = t.properties["課程名稱"]?.title?.[0]?.text?.content || "未命名";
      const dateStr    = t.properties["日期時間"]?.date?.start || "";
      const capacity   = t.properties["名額上限"]?.number || 0;
      const deduct     = t.properties["扣除堂數"]?.number || 1;
      // 報名名單：逗號分隔的孩子姓名字串
      const listRaw    = t.properties["報名名單"]?.rich_text?.[0]?.text?.content || "";
      // 計算報名人數（排除空字串）
      const registered = listRaw ? listRaw.split(",").map(s => s.trim()).filter(Boolean).length : 0;
      const pct        = capacity > 0 ? Math.round((registered / capacity) * 100) : 0;

      const block = document.createElement("div");
      block.style.cssText = "border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:8px;";
      block.innerHTML = `
        <!-- 課程標題列 -->
        <div style="background:var(--clay-rose-light);padding:10px 12px;display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;">🎨</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;color:var(--clay-text-rose);">${name}</div>
            <div style="font-size:11px;color:var(--clay-rose);">${dateStr ? formatDate(dateStr) : ""}</div>
          </div>
          <span class="badge y">扣 ${deduct} 堂</span>
        </div>
        <!-- 報名進度列 -->
        <div style="padding:10px 12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:var(--text2);">
            報名 <strong style="color:var(--text);">${registered}</strong> / ${capacity} 人
          </span>
          <div class="pbar" style="flex:1;">
            <div class="pfill" style="width:${pct}%;"></div>
          </div>
        </div>
        <!-- 報名名單 -->
        ${registered > 0 ? `
          <div style="padding:0 12px 10px;font-size:12px;color:var(--text2);">
            ${listRaw.split(",").map(n => n.trim()).filter(Boolean).join("、")}
          </div>
        ` : ""}
      `;
      listEl.appendChild(block);
    });

  } catch (e) {
    console.error("loadThemeEvents 錯誤:", e);
    loadingEl.textContent = "⚠ 載入失敗：" + e.message;
  }
}

// ── 頁面初始化 ───────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", loadDashboard);
