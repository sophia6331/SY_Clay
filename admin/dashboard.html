<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SY 兒童手作教室 · 後台</title>
<style>
/* ── 基礎 Reset ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --clay-rose:#C4A29E;--clay-sage:#9AAF9F;--clay-sand:#C2B49A;
  --clay-rose-light:#EFE4E2;--clay-sage-light:#E3EDE5;--clay-sand-light:#EDE6DB;
  --clay-rose-mid:#D4B8B4;--clay-sage-mid:#B5C9BA;--clay-sand-mid:#D4C8B4;
  --clay-text-rose:#6B4845;--clay-text-sage:#3A5440;--clay-text-sand:#5C4E38;
  --bg:#fff;--bg2:#f8f7f5;--bg3:#f2f0ec;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --red-light:#fce8e8;--red:#a32d2d;
  --amber-light:#faeeda;--amber:#854f0b;
  --green-light:#eaf3de;--green:#3b6d11;
  --radius-md:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg3);color:var(--text);}
.shell{display:flex;min-height:100vh;}

/* ── Sidebar ──────────────────────────────────── */
.sb{width:150px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:10px 0;gap:2px;flex-shrink:0;}
.si{height:36px;border-radius:var(--radius-md);display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--text2);padding:0 12px;white-space:nowrap;transition:background .15s;}
.si .si-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.si .si-label{overflow:hidden;text-overflow:ellipsis;}
.si.on{background:var(--clay-sage-light);color:var(--clay-text-sage);font-weight:500;}
.si:hover:not(.on){background:var(--bg2);}
.sdiv{height:0.5px;background:var(--border);margin:4px 12px;}
@media(max-width:600px){
  .sb{width:52px;align-items:center;padding:10px 0;}
  .si{width:36px;padding:0;justify-content:center;gap:0;font-size:15px;}
  .si .si-label{display:none;}
  .si .si-icon{font-size:15px;width:auto;}
  .sdiv{width:28px;margin:4px 0;}
}

/* ── Main layout ─────────────────────────────── */
.main{flex:1;overflow:auto;padding:16px;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.topbar h2{font-size:15px;font-weight:500;}

/* ── Cards ───────────────────────────────────── */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:12px;}
.cardtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ct{font-size:12px;font-weight:500;color:var(--text2);}

/* ── Stats grid ──────────────────────────────── */
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat{background:var(--bg2);border-radius:var(--radius-md);padding:10px 12px;}
.sl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.sv{font-size:20px;font-weight:500;color:var(--text);}
.sv.w{color:var(--amber);}.sv.r{color:var(--red);}

/* ── Rows ────────────────────────────────────── */
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.row:last-child{border-bottom:none;}
.rname{font-size:13px;font-weight:500;}
.rsub{font-size:11px;color:var(--text2);}
.ml{margin-left:auto;}

/* ── Avatar ──────────────────────────────────── */
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
/* 顏色輪替（最多10色）*/
.av.c0{background:var(--clay-sage-light);color:var(--clay-text-sage);}
.av.c1{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.av.c2{background:var(--clay-sand-light);color:var(--clay-text-sand);}
.av.c3{background:#FAEEDA;color:#854F0B;}
.av.c4{background:#EEEDFE;color:#3C3489;}

/* ── Badges ──────────────────────────────────── */
.badge{font-size:10px;border-radius:4px;padding:2px 6px;white-space:nowrap;}
.badge.r{background:var(--red-light);color:var(--red);}
.badge.y{background:var(--amber-light);color:var(--amber);}
.badge.g{background:var(--green-light);color:var(--green);}
.badge.t{background:var(--clay-sage-light);color:var(--clay-text-sage);}

/* ── Tags ────────────────────────────────────── */
.tag{display:inline-block;font-size:10px;border-radius:4px;padding:2px 5px;margin-right:2px;}
.tag.t{background:var(--clay-sage-light);color:var(--clay-text-sage);}
.tag.pk{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.tag.s{background:var(--clay-sand-light);color:var(--clay-text-sand);}

/* ── Progress bar ────────────────────────────── */
.pbar-wrap{display:flex;align-items:center;gap:8px;}
.pbar{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--clay-sage);border-radius:2px;}

/* ── Loading / Error states ──────────────────── */
.loading{text-align:center;padding:20px;font-size:12px;color:var(--text3);}
.err-msg{background:var(--red-light);color:var(--red);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;margin-bottom:10px;}

/* ── Refresh button ──────────────────────────── */
.refresh-btn{background:transparent;border:0.5px solid var(--clay-sage-mid);border-radius:var(--radius-md);color:var(--clay-sage);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.refresh-btn:hover{background:var(--clay-sage-light);}

/* ── Calendar ─────────────────────────────────── */
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.cal-nav{display:flex;align-items:center;gap:6px;}
.cal-nav button{background:transparent;border:0.5px solid var(--border);border-radius:6px;width:26px;height:26px;font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;display:flex;align-items:center;justify-content:center;}
.cal-nav button:hover{background:var(--bg2);}
.cal-title{font-size:13px;font-weight:600;min-width:110px;text-align:center;}
.cal-toggle{display:flex;border:0.5px solid var(--border);border-radius:8px;overflow:hidden;}
.cal-toggle button{background:transparent;border:none;padding:5px 12px;font-size:11px;cursor:pointer;color:var(--text2);font-family:inherit;}
.cal-toggle button.on{background:var(--clay-sage);color:#fff;}
.cal-today-btn{background:transparent;border:0.5px solid var(--clay-sage-mid);color:var(--clay-sage);border-radius:6px;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;}
.cal-today-btn:hover{background:var(--clay-sage-light);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dow{font-size:10px;text-align:center;color:var(--text3);padding:4px 0 2px;font-weight:500;}
.cal-dow.sun{color:#c87474;}
.cal-dow.sat{color:#6e9a9a;}
.cal-cell{min-height:70px;background:var(--bg2);border-radius:6px;padding:4px 5px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .15s;position:relative;overflow:hidden;}
.cal-cell:hover{background:var(--bg3, #eee);}
.cal-cell.other{opacity:.35;}
.cal-cell.today{background:var(--clay-sage-light);}
.cal-cell.today .cal-day-num{color:var(--clay-text-sage);font-weight:700;}
.cal-day-num{font-size:11px;color:var(--text2);}
.cal-ev{font-size:9px;line-height:1.25;border-radius:3px;padding:2px 4px;background:var(--clay-sage-light);color:var(--clay-text-sage);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-ev.theme{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.cal-more{font-size:9px;color:var(--text3);padding-left:2px;}

/* Week view uses taller cells */
.cal-grid.week .cal-cell{min-height:150px;}
.cal-grid.week .cal-ev{font-size:10px;padding:3px 5px;line-height:1.35;white-space:normal;}

/* Day detail popover */
.day-detail{margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);display:none;}
.day-detail.show{display:block;}
.day-detail-head{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text1);}
.day-ev-item{padding:8px 10px;background:var(--bg2);border-radius:8px;margin-bottom:6px;}
.day-ev-item .dei-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
.day-ev-item .dei-title{font-size:12px;font-weight:500;}
.day-ev-item .dei-meta{font-size:11px;color:var(--text2);margin-top:3px;}
</style>
</head>

<script>
// ============================================================
// ★ 教室設定 ── 換教室時只需修改這裡 ★
// ============================================================
const CONFIG = {
  // ↓↓↓ 貼上你的 GAS Web App 網址 ↓↓↓
  GAS_URL: "https://script.google.com/macros/s/AKfycbw6PBIUdHTzKBBdbQbRcU-za2rJQtBL6ZEjvJI6z1-NN1ziW1gjTafSdcx8U0E_eRHR/exec",

  NOTION_DB_CHILD:    "338c38a5-6efe-802c-9ea8-edd4375e28c5",
  NOTION_DB_PURCHASE: "338c38a5-6efe-803f-8779-d55a13c35548",
  NOTION_DB_SESSION:  "338c38a5-6efe-80a0-9801-d9517c8431ef",
  NOTION_DB_THEME:    "338c38a5-6efe-80eb-9cda-e51fcb0f34c3",
  NOTION_DB_PARENT:   "338c38a5-6efe-8061-b4f3-fca2a7cb4394",

  LOW_LESSON_THRESHOLD: 1,
  DISMISS_DAYS: 30,
};
// ============================================================

// ── GAS Proxy API 工具函式 ─────────────────────────────────

// ── Notion 查詢快取（sessionStorage, TTL 60 秒） ─────────────
const NOTION_CACHE_TTL_MS = 60 * 1000;
function _cacheKey(dbId, filter, sorts) {
  return "nq:" + dbId + ":" + JSON.stringify(filter || null) + ":" + JSON.stringify(sorts || null);
}
function _cacheGet(key) {
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return null;
    const { t, v } = JSON.parse(raw);
    if (Date.now() - t > NOTION_CACHE_TTL_MS) { sessionStorage.removeItem(key); return null; }
    return v;
  } catch (e) { return null; }
}
function _cacheSet(key, value) {
  try { sessionStorage.setItem(key, JSON.stringify({ t: Date.now(), v: value })); }
  catch (e) { /* quota exceeded - ignore */ }
}
function clearNotionCache() {
  try {
    for (let i = sessionStorage.length - 1; i >= 0; i--) {
      const k = sessionStorage.key(i);
      if (k && k.startsWith("nq:")) sessionStorage.removeItem(k);
    }
  } catch (e) {}
}
async function notionQuery(dbId, filter = null, sorts = null) {
  const key = _cacheKey(dbId, filter, sorts);
  const cached = _cacheGet(key);
  if (cached) return cached;
  const url = new URL(CONFIG.GAS_URL);
  url.searchParams.set("action", "query");
  url.searchParams.set("db", dbId);
  if (filter) url.searchParams.set("filter", JSON.stringify(filter));
  if (sorts) url.searchParams.set("sorts", JSON.stringify(sorts));
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error("GAS 回應錯誤: " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "未知錯誤");
  _cacheSet(key, data.results);
  return data.results;
}

// ── 計算剩餘堂數 ────────────────────────────────────────────

/**
 * 計算某個孩子的剩餘堂數
 * 公式：所有 Purchase 購買堂數加總 - 所有 Session 扣除堂數加總
 * @param {string} childId  Child 頁面 ID
 * @returns {Promise<{purchased, used, remaining}>}
 */
async function calcLessons(childId) {
  // 查詢此孩子的所有購買記錄
  // Purchase 表中 "Child" 欄位（relation）包含此孩子 ID
  const purchases = await notionQuery(CONFIG.NOTION_DB_PURCHASE, {
    property: "Child",
    relation: { contains: childId },
  });

  const purchased = purchases.reduce((sum, p) => {
    return sum + (p.properties["購買堂數"]?.number || 0);
  }, 0);

  // 查詢此孩子出席的所有課程
  // Session 表中 "出席孩子" 欄位（relation）包含此孩子 ID
  const sessions = await notionQuery(CONFIG.NOTION_DB_SESSION, {
    property: "出席孩子",
    relation: { contains: childId },
  });

  const used = sessions.reduce((sum, s) => {
    // 若課程沒有填扣除堂數，預設為 1
    return sum + (s.properties["扣除堂數"]?.number ?? CONFIG.LOW_LESSON_THRESHOLD ?? 1);
  }, 0);

  return { purchased, used, remaining: purchased - used };
}

// ── 日期工具 ─────────────────────────────────────────────────

/** 取得今天的 YYYY-MM-DD 字串（台灣時區）*/
function today() {
  return new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 取得 N 天後的 YYYY-MM-DD 字串 */
function daysLater(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 取得本週一的 YYYY-MM-DD 字串 */
function thisMonday() {
  const d = new Date();
  const day = d.getDay(); // 0=日, 1=一...
  const diff = day === 0 ? -6 : 1 - day; // 讓週日往前推到上週一
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}

/** 取得本月第一天的 YYYY-MM-DD 字串 */
function thisMonthStart() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-01`;
}

/** 將 YYYY-MM-DD 轉成中文日期（含星期） */
function formatDate(str) {
  if (!str) return "";
  const d = new Date(str + "T00:00:00+08:00");
  const weekDays = ["日","一","二","三","四","五","六"];
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const w = weekDays[d.getDay()];
  return `${m}/${day}（週${w}）`;
}

// ── 頭像顏色輪替 ─────────────────────────────────────────────
const AV_COLORS = ["c0","c1","c2","c3","c4"];
function avColor(index) { return AV_COLORS[index % AV_COLORS.length]; }

/** 取孩子名稱第一個字當頭像文字 */
function avText(name) { return name ? name[0] : "?"; }



// ── 儀表板主要載入函式 ───────────────────────────────────────

async function loadDashboard() {
  // 重置 loading 狀態
  ["next3-loading","theme-loading"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "";
  });
  ["next3-list","theme-list"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = "";
  });
  ["next3-empty","theme-empty"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = "none";
  });
  ["stat-week","stat-purchase"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = "…";
  });

  // 兩個區塊平行載入，互不影響
  await Promise.all([
    loadStats(),
    loadCalendar(),
    loadThemeEvents(),
  ]);
}

// ── 載入統計數字 ─────────────────────────────────────────────

async function loadStats() {
  try {
    // 本週課程數：日期 >= 本週一 且 <= 今天
    const weeklySessions = await notionQuery(CONFIG.NOTION_DB_SESSION, {
      and: [
        { property: "日期", date: { on_or_after: thisMonday() } },
        { property: "日期", date: { on_or_before: today() } },
      ]
    });
    document.getElementById("stat-week").textContent = weeklySessions.length;

    // 本月新購數：付款日期 >= 本月第一天
    const monthPurchases = await notionQuery(CONFIG.NOTION_DB_PURCHASE, {
      property: "付款日期",
      date: { on_or_after: thisMonthStart() },
    });
    document.getElementById("stat-purchase").textContent = monthPurchases.length;

  } catch (e) {
    console.error("loadStats 錯誤:", e);
    document.getElementById("stat-week").textContent = "!";
    document.getElementById("stat-purchase").textContent = "!";
  }
}



// ── 報名狀況 Calendar（月 / 週） ──────────────────────────────

const calState = {
  mode: "month",       // "month" | "week"
  cursor: new Date(),  // 目前定位日期
  events: [],          // { dateStr, type, slot, childNames[], id, title }
  childMap: {},
  loaded: false,
};

function ymdLocal(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate())
    .toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth() + 1, 0); }
function startOfCalMonth(d) {
  // 月曆左上角：月初往前回到週日
  const first = startOfMonth(d);
  return addDays(first, -first.getDay());
}
function endOfCalMonth(d) {
  const last = endOfMonth(d);
  return addDays(last, 6 - last.getDay());
}
function startOfWeek(d) { return addDays(d, -d.getDay()); }
function endOfWeek(d) { return addDays(startOfWeek(d), 6); }

async function loadCalendar() {
  const loadingEl = document.getElementById("cal-loading");
  const wrapEl = document.getElementById("cal-wrap");

  try {
    // 查詢近 ±3 個月的 Session（涵蓋常見瀏覽範圍）
    const fromDate = addDays(new Date(), -100);
    const toDate = addDays(new Date(), 100);
    const from = ymdLocal(fromDate);
    const to = ymdLocal(toDate);

    const [sessions, themes, allChildren] = await Promise.all([
      notionQuery(CONFIG.NOTION_DB_SESSION, {
        and: [
          { property: "日期", date: { on_or_after: from } },
          { property: "日期", date: { on_or_before: to } },
        ]
      }),
      notionQuery(CONFIG.NOTION_DB_THEME, {
        and: [
          { property: "日期時間", date: { on_or_after: from } },
          { property: "日期時間", date: { on_or_before: to } },
        ]
      }).catch(() => []),
      notionQuery(CONFIG.NOTION_DB_CHILD),
    ]);

    calState.childMap = {};
    allChildren.forEach(c => {
      calState.childMap[c.id] = c.properties["暱稱"]?.title?.[0]?.text?.content || "未知";
    });

    const events = [];

    sessions.forEach(s => {
      const dateStr = s.properties["日期"]?.date?.start || "";
      if (!dateStr) return;
      const slot = s.properties["時段"]?.rich_text?.[0]?.text?.content || "";
      const type = s.properties["課程類型"]?.select?.name || "一般課程";
      const childRels = s.properties["出席孩子"]?.relation || [];
      const childNames = childRels.map(r => calState.childMap[r.id] || "?");
      events.push({
        id: s.id,
        dateStr: dateStr.slice(0, 10),
        type,
        slot,
        childNames,
        title: type,
        kind: "session",
      });
    });

    themes.forEach(t => {
      const dStr = t.properties["日期時間"]?.date?.start || "";
      if (!dStr) return;
      const name = t.properties["課程名稱"]?.title?.[0]?.text?.content || "主題課程";
      const listR = t.properties["報名名單"]?.rich_text?.[0]?.text?.content || "";
      const namesArr = listR.split(/[、,\s]+/).filter(x => x.trim());
      events.push({
        id: t.id,
        dateStr: dStr.slice(0, 10),
        type: "主題課程",
        slot: "",
        childNames: namesArr,
        title: name,
        kind: "theme",
      });
    });

    calState.events = events;
    calState.loaded = true;
    loadingEl.style.display = "none";
    wrapEl.style.display = "";
    renderCalendar();
  } catch (e) {
    console.error("loadCalendar 錯誤:", e);
    loadingEl.textContent = "⚠ 載入失敗：" + e.message;
  }
}

function calSetMode(mode) {
  calState.mode = mode;
  document.querySelectorAll("#cal-toggle button").forEach(b => {
    b.classList.toggle("on", b.dataset.mode === mode);
  });
  renderCalendar();
}
function calPrev() {
  if (calState.mode === "month") {
    calState.cursor = new Date(calState.cursor.getFullYear(), calState.cursor.getMonth() - 1, 1);
  } else {
    calState.cursor = addDays(calState.cursor, -7);
  }
  renderCalendar();
}
function calNext() {
  if (calState.mode === "month") {
    calState.cursor = new Date(calState.cursor.getFullYear(), calState.cursor.getMonth() + 1, 1);
  } else {
    calState.cursor = addDays(calState.cursor, 7);
  }
  renderCalendar();
}
function calGoToday() {
  calState.cursor = new Date();
  renderCalendar();
}

function renderCalendar() {
  if (!calState.loaded) return;
  const grid = document.getElementById("cal-grid");
  const title = document.getElementById("cal-title");
  const todayStr = ymdLocal(new Date());

  // 建立 dateStr → events[] map
  const byDate = {};
  calState.events.forEach(e => {
    (byDate[e.dateStr] ||= []).push(e);
  });

  let startD, endD;
  if (calState.mode === "month") {
    startD = startOfCalMonth(calState.cursor);
    endD = endOfCalMonth(calState.cursor);
    title.textContent = `${calState.cursor.getFullYear()} 年 ${calState.cursor.getMonth() + 1} 月`;
    grid.classList.remove("week");
  } else {
    startD = startOfWeek(calState.cursor);
    endD = endOfWeek(calState.cursor);
    title.textContent = `${startD.getMonth() + 1}/${startD.getDate()} ~ ${endD.getMonth() + 1}/${endD.getDate()}`;
    grid.classList.add("week");
  }

  const curMonth = calState.cursor.getMonth();
  grid.innerHTML = "";
  let d = new Date(startD);
  while (d <= endD) {
    const dateStr = ymdLocal(d);
    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if (calState.mode === "month" && d.getMonth() !== curMonth) cell.classList.add("other");
    if (dateStr === todayStr) cell.classList.add("today");

    const dayNum = document.createElement("div");
    dayNum.className = "cal-day-num";
    dayNum.textContent = d.getDate();
    cell.appendChild(dayNum);

    const list = byDate[dateStr] || [];
    const maxShow = calState.mode === "month" ? 2 : 6;
    list.slice(0, maxShow).forEach(ev => {
      const chip = document.createElement("div");
      chip.className = "cal-ev" + (ev.kind === "theme" ? " theme" : "");
      const txt = calState.mode === "week"
        ? `${ev.slot ? ev.slot + " " : ""}${ev.title}・${ev.childNames.length}人`
        : `${ev.title}・${ev.childNames.length}`;
      chip.textContent = txt;
      chip.title = `${ev.title}｜${ev.slot || "—"}｜${ev.childNames.join("、") || "無報名"}`;
      cell.appendChild(chip);
    });
    if (list.length > maxShow) {
      const more = document.createElement("div");
      more.className = "cal-more";
      more.textContent = `+${list.length - maxShow} 更多`;
      cell.appendChild(more);
    }

    cell.onclick = () => showDayDetail(dateStr);
    grid.appendChild(cell);
    d = addDays(d, 1);
  }
}

function showDayDetail(dateStr) {
  const detailEl = document.getElementById("day-detail");
  const headEl = document.getElementById("day-detail-head");
  const listEl = document.getElementById("day-detail-list");
  const items = calState.events.filter(e => e.dateStr === dateStr);

  detailEl.classList.add("show");
  headEl.textContent = formatDate(dateStr);
  listEl.innerHTML = "";

  if (items.length === 0) {
    listEl.innerHTML = `<div style="font-size:12px;color:var(--text3);">此日無課程報名</div>`;
    return;
  }

  items.forEach(ev => {
    const row = document.createElement("div");
    row.className = "day-ev-item";
    const tagCls = ev.kind === "theme" ? "pk" : "t";
    const tagsHtml = ev.childNames.map(n => `<span class="tag s">${n}</span>`).join("");
    row.innerHTML = `
      <div class="dei-top">
        <span class="dei-title">${ev.title}</span>
        <span class="tag ${tagCls}">${ev.type}</span>
        ${ev.slot ? `<span style="font-size:11px;color:var(--text2);">${ev.slot}</span>` : ""}
      </div>
      <div>${tagsHtml || `<span style="font-size:11px;color:var(--text3);">無報名</span>`}</div>
      <div class="dei-meta">${ev.childNames.length} 人已報名</div>
    `;
    listEl.appendChild(row);
  });
}

// ── 載入主題課程 ─────────────────────────────────────────────

async function loadThemeEvents() {
  const loadingEl = document.getElementById("theme-loading");
  const listEl    = document.getElementById("theme-list");
  const emptyEl   = document.getElementById("theme-empty");

  try {
    // 只載入報名狀態為「開放」的主題課程
    const themes = await notionQuery(CONFIG.NOTION_DB_THEME, {
      property: "報名狀態",
      select: { equals: "開放" },
    });

    loadingEl.style.display = "none";

    if (themes.length === 0) {
      emptyEl.style.display = "";
      return;
    }

    themes.forEach(t => {
      const name       = t.properties["課程名稱"]?.title?.[0]?.text?.content || "未命名";
      const dateStr    = t.properties["日期時間"]?.date?.start || "";
      const capacity   = t.properties["名額上限"]?.number || 0;
      const deduct     = t.properties["扣除堂數"]?.number || 1;
      // 報名名單：逗號分隔的孩子姓名字串
      const listRaw    = t.properties["報名名單"]?.rich_text?.[0]?.text?.content || "";
      // 計算報名人數（排除空字串）
      const registered = listRaw ? listRaw.split(",").map(s => s.trim()).filter(Boolean).length : 0;
      const pct        = capacity > 0 ? Math.round((registered / capacity) * 100) : 0;

      const block = document.createElement("div");
      block.style.cssText = "border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:8px;";
      block.innerHTML = `
        <!-- 課程標題列 -->
        <div style="background:var(--clay-rose-light);padding:10px 12px;display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;">🎨</span>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;color:var(--clay-text-rose);">${name}</div>
            <div style="font-size:11px;color:var(--clay-rose);">${dateStr ? formatDate(dateStr) : ""}</div>
          </div>
          <span class="badge y">扣 ${deduct} 堂</span>
        </div>
        <!-- 報名進度列 -->
        <div style="padding:10px 12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:var(--text2);">
            報名 <strong style="color:var(--text);">${registered}</strong> / ${capacity} 人
          </span>
          <div class="pbar" style="flex:1;">
            <div class="pfill" style="width:${pct}%;"></div>
          </div>
        </div>
        <!-- 報名名單 -->
        ${registered > 0 ? `
          <div style="padding:0 12px 10px;font-size:12px;color:var(--text2);">
            ${listRaw.split(",").map(n => n.trim()).filter(Boolean).join("、")}
          </div>
        ` : ""}
      `;
      listEl.appendChild(block);
    });

  } catch (e) {
    console.error("loadThemeEvents 錯誤:", e);
    loadingEl.textContent = "⚠ 載入失敗：" + e.message;
  }
}

// ── 頁面初始化 ───────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", loadDashboard);
