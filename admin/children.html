<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SY 後台 · 孩子管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --clay-rose:#C4A29E;--clay-sage:#9AAF9F;--clay-sand:#C2B49A;
  --clay-rose-light:#EFE4E2;--clay-sage-light:#E3EDE5;--clay-sand-light:#EDE6DB;
  --clay-rose-mid:#D4B8B4;--clay-sage-mid:#B5C9BA;--clay-sand-mid:#D4C8B4;
  --clay-text-rose:#6B4845;--clay-text-sage:#3A5440;--clay-text-sand:#5C4E38;
  --bg:#fff;--bg2:#f8f7f5;--bg3:#f2f0ec;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --red-light:#fce8e8;--red:#a32d2d;
  --amber-light:#faeeda;--amber:#854f0b;
  --green-light:#eaf3de;--green:#3b6d11;
  --radius-md:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg3);color:var(--text);}
.shell{display:flex;min-height:100vh;}

/* Sidebar */
.sb{width:52px;background:var(--bg);border-right:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;flex-shrink:0;}
.si{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;border:none;background:transparent;color:var(--text2);}
.si.on{background:var(--clay-sage-light);color:var(--clay-text-sage);}
.si:hover:not(.on){background:var(--bg2);}
.sdiv{width:28px;height:0.5px;background:var(--border);margin:4px 0;}

/* Main */
.main{flex:1;overflow:auto;padding:16px;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.topbar h2{font-size:15px;font-weight:500;}

/* Card */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:12px;}
.cardtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ct{font-size:12px;font-weight:500;color:var(--text2);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px;}
.stat{background:var(--bg2);border-radius:var(--radius-md);padding:10px 12px;}
.sl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.sv{font-size:20px;font-weight:500;color:var(--text);}
.sv.r{color:var(--red);}

/* Rows */
.row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--border);cursor:pointer;}
.row:last-child{border-bottom:none;}
.row:hover{background:var(--bg2);margin:0 -14px;padding:9px 14px;border-radius:var(--radius-md);}
.rname{font-size:13px;font-weight:500;}
.rsub{font-size:11px;color:var(--text2);}

/* Avatar */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;}
.av.c0{background:var(--clay-sage-light);color:var(--clay-text-sage);}
.av.c1{background:var(--clay-rose-light);color:var(--clay-text-rose);}
.av.c2{background:var(--clay-sand-light);color:var(--clay-text-sand);}
.av.c3{background:#FAEEDA;color:#854F0B;}
.av.c4{background:#EEEDFE;color:#3C3489;}

/* Badges */
.badge{font-size:10px;border-radius:4px;padding:2px 6px;white-space:nowrap;}
.badge.r{background:var(--red-light);color:var(--red);}
.badge.y{background:var(--amber-light);color:var(--amber);}
.badge.g{background:var(--green-light);color:var(--green);}

/* Forms */
.fl{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;}
.fi{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-md);padding:7px 9px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;}
.fi:focus{outline:none;border-color:var(--clay-sage);}
.fg{margin-bottom:8px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.fbg{background:var(--bg2);border-radius:var(--radius-md);padding:10px 12px;}

/* Buttons */
.abtn{background:var(--clay-sage);color:white;border:none;border-radius:var(--radius-md);padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
.abtn:disabled{opacity:.5;cursor:not-allowed;}
.abtn.g{background:transparent;color:var(--clay-sage);border:0.5px solid var(--clay-sage-mid);}
.abtn.sm{padding:4px 10px;font-size:11px;}
.abtn.danger{background:transparent;color:var(--red);border:0.5px solid #f09595;font-size:11px;padding:4px 10px;}
.ilink{font-size:11px;color:var(--clay-sage);background:transparent;border:none;cursor:pointer;font-family:inherit;padding:0;}

/* Views */
.view{display:none;}.view.on{display:block;}

/* Loading / Error */
.loading{text-align:center;padding:20px;font-size:12px;color:var(--text3);}
.err{background:var(--red-light);color:var(--red);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;margin-bottom:10px;}
.success{background:var(--green-light);color:var(--green);border-radius:var(--radius-md);padding:8px 12px;font-size:12px;margin-bottom:10px;}

/* Divider */
.divline{height:0.5px;background:var(--border);margin:10px 0;}

/* Session history items */
.shi{display:flex;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.shi:last-child{border-bottom:none;}
</style>
</head>
<body>

<script>
// ============================================================
// ★ 設定 ── 換教室時只需修改這裡 ★
// ============================================================
const CONFIG = {
  NOTION_API_KEY:     "填入你的 Notion API Key",  // ← 必填
  NOTION_DB_CHILD:    "338c38a5-6efe-802c-9ea8-edd4375e28c5",
  NOTION_DB_PURCHASE: "338c38a5-6efe-803f-8779-d55a13c35548",
  NOTION_DB_SESSION:  "338c38a5-6efe-80a0-9801-d9517c8431ef",
  NOTION_DB_PARENT:   "338c38a5-6efe-8061-b4f3-fca2a7cb4394",
  LOW_LESSON_THRESHOLD: 1,
};
// ============================================================

// ── Notion API ────────────────────────────────────────────

const NOTION_HEADERS = () => ({
  "Authorization": `Bearer ${CONFIG.NOTION_API_KEY}`,
  "Notion-Version": "2022-06-28",
  "Content-Type": "application/json",
});

/**
 * 查詢 Notion Database
 * @param {string} dbId  - Database ID
 * @param {object} filter - Notion filter（null 表示不篩選）
 */
async function notionQuery(dbId, filter = null) {
  const body = { page_size: 100 };
  if (filter) body.filter = filter;
  const res = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
    method: "POST",
    headers: NOTION_HEADERS(),
    body: JSON.stringify(body),
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message); }
  return (await res.json()).results || [];
}

/**
 * 新增 Notion 頁面（一筆資料）
 * @param {string} dbId        - Database ID
 * @param {object} properties  - Notion properties 物件
 */
async function notionCreate(dbId, properties) {
  const res = await fetch("https://api.notion.com/v1/pages", {
    method: "POST",
    headers: NOTION_HEADERS(),
    body: JSON.stringify({ parent: { database_id: dbId }, properties }),
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message); }
  return await res.json();
}

/**
 * 更新 Notion 頁面
 * @param {string} pageId      - 要更新的頁面 ID
 * @param {object} properties  - 要更新的欄位
 */
async function notionUpdate(pageId, properties) {
  const res = await fetch(`https://api.notion.com/v1/pages/${pageId}`, {
    method: "PATCH",
    headers: NOTION_HEADERS(),
    body: JSON.stringify({ properties }),
  });
  if (!res.ok) { const e = await res.json(); throw new Error(e.message); }
  return await res.json();
}

// ── 工具函式 ─────────────────────────────────────────────────

const AV_COLORS = ["c0","c1","c2","c3","c4"];
const avColor = (i) => AV_COLORS[i % AV_COLORS.length];

/** 從生日字串計算年齡（格式：XYxM） */
function calcAge(birthdayStr) {
  if (!birthdayStr) return "";
  const birth = new Date(birthdayStr + "T00:00:00+08:00");
  const now   = new Date();
  let years  = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  if (months < 0) { years--; months += 12; }
  if (now.getDate() < birth.getDate()) months--;
  if (months < 0) { years--; months += 11; }
  return `${years}歲${months}個月`;
}

/** YYYY-MM-DD → M/D（週X） */
function formatDate(str) {
  if (!str) return "";
  const d = new Date(str + "T00:00:00+08:00");
  const days = ["日","一","二","三","四","五","六"];
  return `${d.getMonth()+1}/${d.getDate()}（週${days[d.getDay()]}）`;
}

/** 顯示/隱藏 view */
function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("on"));
  document.getElementById(id).classList.add("on");
}

/** 顯示錯誤訊息 */
function showErr(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = "⚠ " + msg;
  el.style.display = "";
}

/** 隱藏錯誤訊息 */
function hideMsg(elId) {
  document.getElementById(elId).style.display = "none";
}

// ── 全域狀態：目前選中的孩子 ─────────────────────────────────
// 儲存目前在詳細頁/編輯頁中的孩子資料，避免重複 API 呼叫
let currentChild = null;     // { id, name, birthday, gender, parentId, pageId }
let allParents   = [];       // Parent 列表快取，供選單用
let allChildren  = [];       // Child 列表快取

// ── 載入孩子列表 ─────────────────────────────────────────────

async function loadChildList() {
  const loadingEl = document.getElementById("list-loading");
  const listEl    = document.getElementById("child-list");
  const emptyEl   = document.getElementById("list-empty");
  const errEl     = document.getElementById("list-err");

  loadingEl.style.display = "";
  listEl.innerHTML = "";
  emptyEl.style.display = "none";
  errEl.style.display = "none";

  try {
    // 取得所有孩子（依暱稱字母排序）
    allChildren = await notionQuery(CONFIG.NOTION_DB_CHILD);

    loadingEl.style.display = "none";

    if (allChildren.length === 0) {
      emptyEl.style.display = "";
      return;
    }

    // 更新標題上的數量
    document.querySelector("#v-list .topbar h2").textContent =
      `孩子管理（${allChildren.length} 位）`;

    // 渲染每一個孩子
    allChildren.forEach((child, idx) => {
      const name     = child.properties["暱稱"]?.title?.[0]?.text?.content || "未知";
      const birthday = child.properties["生日"]?.date?.start || "";
      const age      = calcAge(birthday);

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="av ${avColor(idx)}">${name[0] || "?"}</div>
        <div style="flex:1;">
          <div class="rname">${name}</div>
          <div class="rsub">${birthday ? birthday + "　" + age : "未填生日"}</div>
        </div>
        <span style="font-size:11px;color:var(--text3);">›</span>
      `;
      // 點擊進入詳細頁
      row.addEventListener("click", () => openChildDetail(child, idx));
      listEl.appendChild(row);
    });

  } catch (e) {
    loadingEl.style.display = "none";
    showErr("list-err", "載入失敗：" + e.message);
    console.error(e);
  }
}

// ── 開啟孩子詳細頁 ───────────────────────────────────────────

async function openChildDetail(child, idx) {
  // 儲存當前孩子資料到全域，供編輯頁使用
  const name     = child.properties["暱稱"]?.title?.[0]?.text?.content || "";
  const birthday = child.properties["生日"]?.date?.start || "";
  const gender   = child.properties["性別"]?.select?.name || "";
  const parentRel = child.properties["Parent"]?.relation || [];
  const parentId = parentRel.length > 0 ? parentRel[0].id : "";

  currentChild = { id: child.id, name, birthday, gender, parentId };

  showView("v-detail");

  // 渲染頭像與基本資訊
  const avEl = document.getElementById("detail-av");
  avEl.className = `av ${avColor(idx)}`;
  avEl.style.cssText = "width:44px;height:44px;font-size:16px;";
  avEl.textContent = name[0] || "?";

  document.getElementById("detail-name").textContent = name;
  document.getElementById("detail-meta").textContent =
    birthday ? `${birthday}　${calcAge(birthday)}` : "未填生日";

  // 顯示骨架
  document.getElementById("detail-content").style.display = "";
  document.getElementById("detail-loading").style.display = "none";

  // 並行載入：堂數 + 上課紀錄
  await Promise.all([
    loadLessons(child.id),
    loadSessions(child.id),
  ]);
}

// ── 載入堂數 ─────────────────────────────────────────────────

async function loadLessons(childId) {
  document.getElementById("detail-purchased").textContent = "…";
  document.getElementById("detail-used").textContent = "…";
  document.getElementById("detail-remaining").textContent = "…";

  try {
    // 查此孩子的所有購買記錄
    const purchases = await notionQuery(CONFIG.NOTION_DB_PURCHASE, {
      property: "Child",
      relation: { contains: childId },
    });
    const purchased = purchases.reduce((s, p) =>
      s + (p.properties["購買堂數"]?.number || 0), 0);

    // 查此孩子的所有出席課程
    // Session 表關聯孩子的欄位名稱是「出席孩子」
    const sessions = await notionQuery(CONFIG.NOTION_DB_SESSION, {
      property: "出席孩子",
      relation: { contains: childId },
    });
    const used = sessions.reduce((s, se) =>
      s + (se.properties["扣除堂數"]?.number || 1), 0);

    const remaining = purchased - used;

    document.getElementById("detail-purchased").textContent = purchased;
    document.getElementById("detail-used").textContent = used;

    // 剩餘堂數：依數量給不同顏色
    const remEl = document.getElementById("detail-remaining");
    remEl.textContent = remaining;
    remEl.className = "sv" + (remaining <= 0 ? " r" : remaining <= CONFIG.LOW_LESSON_THRESHOLD ? " r" : "");

  } catch (e) {
    console.error("loadLessons 錯誤:", e);
    document.getElementById("detail-remaining").textContent = "!";
  }
}

// ── 載入上課紀錄 ─────────────────────────────────────────────

async function loadSessions(childId) {
  const loadingEl = document.getElementById("sessions-loading");
  const listEl    = document.getElementById("sessions-list");
  const emptyEl   = document.getElementById("sessions-empty");

  loadingEl.style.display = "";
  listEl.innerHTML = "";
  emptyEl.style.display = "none";

  try {
    // 查此孩子出席的所有課程，並依日期新到舊排序
    const sessions = await notionQuery(CONFIG.NOTION_DB_SESSION, {
      property: "出席孩子",
      relation: { contains: childId },
    });

    // 依日期排序（新到舊）
    sessions.sort((a, b) => {
      const da = a.properties["日期"]?.date?.start || "";
      const db = b.properties["日期"]?.date?.start || "";
      return db.localeCompare(da);
    });

    loadingEl.style.display = "none";

    if (sessions.length === 0) {
      emptyEl.style.display = "";
      return;
    }

    sessions.forEach(s => {
      const dateStr  = s.properties["日期"]?.date?.start || "";
      const type     = s.properties["課程類型"]?.select?.name || "一般課程";
      const slot     = s.properties["時段"]?.rich_text?.[0]?.text?.content || "";
      const deduct   = s.properties["扣除堂數"]?.number || 1;
      const note     = s.properties["備註"]?.rich_text?.[0]?.text?.content || "";
      const typeClass = type === "主題課程" ? "pk" : "t";
      const typeBg    = type === "主題課程"
        ? "background:var(--clay-rose-light);color:var(--clay-text-rose);"
        : "background:var(--clay-sage-light);color:var(--clay-text-sage);";

      const item = document.createElement("div");
      item.className = "shi";
      item.innerHTML = `
        <!-- 日期欄 -->
        <div style="min-width:52px;flex-shrink:0;">
          <div style="font-size:12px;font-weight:500;">${formatDate(dateStr)}</div>
        </div>
        <!-- 課程資訊欄 -->
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
            <span style="font-size:10px;border-radius:4px;padding:2px 6px;${typeBg}">${type}</span>
            ${slot ? `<span style="font-size:11px;color:var(--text2);">${slot}</span>` : ""}
          </div>
          ${note ? `<div style="font-size:11px;color:var(--text2);">${note}</div>` : ""}
        </div>
        <!-- 扣堂數 -->
        <div style="font-size:11px;color:var(--text2);flex-shrink:0;">
          −${deduct} 堂
        </div>
      `;
      listEl.appendChild(item);
    });

  } catch (e) {
    loadingEl.style.display = "none";
    console.error("loadSessions 錯誤:", e);
    emptyEl.style.display = "";
    emptyEl.textContent = "載入失敗：" + e.message;
  }
}

// ── 載入家長選單 ─────────────────────────────────────────────

async function loadParentOptions(selectId, selectedId = "") {
  const sel = document.getElementById(selectId);
  sel.innerHTML = `<option value="">— 不關聯 —</option>`;

  try {
    // 若已有快取就直接用，避免重複呼叫
    if (allParents.length === 0) {
      allParents = await notionQuery(CONFIG.NOTION_DB_PARENT);
    }

    allParents.forEach(p => {
      const uid      = p.properties["LINE UID"]?.title?.[0]?.text?.content || "";
      const dispName = p.properties["LINE 顯示名稱"]?.rich_text?.[0]?.text?.content || "";
      const label    = dispName || uid || "未知家長";
      const opt      = document.createElement("option");
      opt.value      = p.id;        // Notion page ID
      opt.textContent = label;
      if (p.id === selectedId) opt.selected = true;
      sel.appendChild(opt);
    });

  } catch (e) {
    sel.innerHTML = `<option value="">— 載入失敗 —</option>`;
    console.error("loadParentOptions 錯誤:", e);
  }
}

// ── 新增孩子 ─────────────────────────────────────────────────

async function submitAddChild() {
  hideMsg("add-err");
  hideMsg("add-success");

  const name     = document.getElementById("add-name").value.trim();
  const birthday = document.getElementById("add-birthday").value;
  const gender   = document.getElementById("add-gender").value;
  const parentId = document.getElementById("add-parent").value;

  // 驗證必填欄位
  if (!name)     { showErr("add-err", "請填寫孩子暱稱"); return; }
  if (!birthday) { showErr("add-err", "請填寫生日"); return; }

  const btn = document.getElementById("add-btn");
  btn.disabled = true;
  btn.textContent = "儲存中…";

  try {
    // 準備 Notion properties
    // 欄位名稱必須完全對應 Notion 資料表的欄位
    const props = {
      "暱稱":  { title: [{ text: { content: name } }] },
      "生日":  { date: { start: birthday } },
    };

    // 性別：有值才填，否則不傳（避免 Notion 驗證錯誤）
    if (gender) {
      props["性別"] = { select: { name: gender } };
    }

    // 關聯家長：有選才填
    if (parentId) {
      props["Parent"] = { relation: [{ id: parentId }] };
    }

    await notionCreate(CONFIG.NOTION_DB_CHILD, props);

    // 成功：清空表單、顯示成功訊息
    document.getElementById("add-name").value = "";
    document.getElementById("add-birthday").value = "";
    document.getElementById("add-gender").value = "";
    document.getElementById("add-parent").value = "";

    document.getElementById("add-success").textContent =
      `✅ 已成功新增「${name}」！`;
    document.getElementById("add-success").style.display = "";

    // 重新整理列表
    allChildren = []; // 清快取
    loadChildList();

    // 2 秒後跳回列表
    setTimeout(() => showView("v-list"), 2000);

  } catch (e) {
    showErr("add-err", "儲存失敗：" + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = "儲存";
  }
}

// ── 編輯孩子 ─────────────────────────────────────────────────

/** 從詳細頁點「編輯」時，帶入目前孩子資料到編輯表單 */
async function showEditFromDetail() {
  if (!currentChild) return;

  showView("v-edit");

  // 填入欄位
  document.getElementById("edit-page-id").value  = currentChild.id;
  document.getElementById("edit-name").value     = currentChild.name;
  document.getElementById("edit-birthday").value = currentChild.birthday;
  document.getElementById("edit-gender").value   = currentChild.gender;

  hideMsg("edit-err");
  hideMsg("edit-success");

  // 載入家長選單，並預選當前家長
  await loadParentOptions("edit-parent", currentChild.parentId);
}

async function submitEditChild() {
  hideMsg("edit-err");
  hideMsg("edit-success");

  const pageId   = document.getElementById("edit-page-id").value;
  const name     = document.getElementById("edit-name").value.trim();
  const birthday = document.getElementById("edit-birthday").value;
  const gender   = document.getElementById("edit-gender").value;
  const parentId = document.getElementById("edit-parent").value;

  if (!name) { showErr("edit-err", "請填寫孩子暱稱"); return; }

  const btn = document.getElementById("edit-btn");
  btn.disabled = true;
  btn.textContent = "儲存中…";

  try {
    const props = {
      "暱稱": { title: [{ text: { content: name } }] },
    };

    // 生日：有填才更新
    if (birthday) {
      props["生日"] = { date: { start: birthday } };
    }

    // 性別
    if (gender) {
      props["性別"] = { select: { name: gender } };
    }

    // 家長：有選才更新；沒選就清空（空陣列）
    props["Parent"] = parentId
      ? { relation: [{ id: parentId }] }
      : { relation: [] };

    await notionUpdate(pageId, props);

    // 更新全域快取中的名稱（讓返回詳細頁時顯示正確）
    currentChild.name     = name;
    currentChild.birthday = birthday;
    currentChild.gender   = gender;
    currentChild.parentId = parentId;

    document.getElementById("edit-success").textContent = "✅ 已儲存！";
    document.getElementById("edit-success").style.display = "";

    // 重新整理列表快取
    allChildren = [];

    // 1.5 秒後返回詳細頁，並重新載入
    setTimeout(async () => {
      showView("v-detail");
      // 重新渲染詳細頁（用更新後的資料）
      const updatedIdx = 0; // 顏色不影響，固定 0
      document.getElementById("detail-name").textContent = name;
      document.getElementById("detail-meta").textContent =
        birthday ? `${birthday}　${calcAge(birthday)}` : "未填生日";
      document.getElementById("detail-av").textContent = name[0] || "?";
    }, 1500);

  } catch (e) {
    showErr("edit-err", "儲存失敗：" + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = "儲存變更";
  }
}

// ── 初始化 ───────────────────────────────────────────────────

document.addEventListener("DOMContentLoaded", async () => {
  // 載入孩子列表
  await loadChildList();
  // 同時預載家長選單（供新增表單使用）
  await loadParentOptions("add-parent");
});
</script>
