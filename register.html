<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>報名紀錄 · SY 兒童手作教室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#9AAF9F;--sage-l:#E3EDE5;--sage-m:#B5C9BA;--sage-t:#3A5440;
  --rose:#C4A29E;--rose-l:#EFE4E2;--rose-t:#6B4845;
  --sand:#C2B49A;--sand-l:#EDE6DB;--sand-t:#5C4E38;
  --bg:#fff;--bg2:#f8f7f5;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --r-md:8px;--r-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
.page{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;}
.nav-title{font-size:13px;font-weight:500;}
.nav-links{display:flex;gap:14px;}
.nl{font-size:13px;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:inherit;padding:0;text-decoration:none;display:inline-block;}
.nl.on{color:var(--sage);font-weight:500;border-bottom:1.5px solid var(--sage);padding-bottom:1px;}
.sec{padding:16px 16px 0;}
.sec-lbl{font-size:10px;font-weight:500;color:var(--sand);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px;}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;}
.fi{width:100%;border:0.5px solid var(--border);border-radius:var(--r-md);padding:8px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;}
.fi:focus{outline:none;border-color:var(--sage);}
.fg{margin-bottom:10px;}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.btn-main{width:100%;background:var(--sage);color:#fff;border:none;border-radius:var(--r-md);padding:11px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-main:disabled{opacity:.5;cursor:not-allowed;}
.btn-ghost{width:100%;background:transparent;color:var(--sage);border:1px solid var(--sage-m);border-radius:var(--r-md);padding:9px;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:6px;}
.btn-sm{background:transparent;color:var(--sage);border:0.5px solid var(--sage-m);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;}
.cancel-lnk{display:block;text-align:center;font-size:11px;color:var(--text3);cursor:pointer;text-decoration:underline;padding:3px;}
.divline{height:0.5px;background:var(--border);margin:10px 0;}
.loading{text-align:center;padding:16px;font-size:12px;color:var(--text3);}
.err-box{background:#fce8e8;color:#a32d2d;border-radius:var(--r-md);padding:8px 12px;font-size:12px;margin-bottom:10px;}
.ok-box{background:var(--sage-l);color:var(--sage-t);border-radius:var(--r-md);padding:8px 12px;font-size:12px;margin-bottom:10px;}
.tag{display:inline-block;font-size:11px;border-radius:5px;padding:3px 8px;}
.tag.sage{background:var(--sage-l);color:var(--sage-t);}
.tag.rose{background:var(--rose-l);color:var(--rose-t);}
.tag.sand{background:var(--sand-l);color:var(--sand-t);}
.pbar-wrap{display:flex;align-items:center;gap:8px;}
.pbar{flex:1;height:3px;background:var(--sage-l);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:var(--sage);border-radius:2px;}
.line-block{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#06C755;border-radius:var(--r-lg);margin-bottom:14px;}
.line-qr{width:62px;height:62px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.line-txt strong{display:block;font-size:13px;color:#fff;font-weight:500;margin-bottom:3px;}
.line-txt p{font-size:12px;color:rgba(255,255,255,.9);line-height:1.6;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:none;align-items:flex-end;justify-content:center;}
.modal-ov.show{display:flex;}
.modal-box{background:var(--bg);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:430px;}
.modal-title{font-size:15px;font-weight:600;text-align:center;margin-bottom:8px;line-height:1.5;}
.modal-desc{font-size:13px;color:var(--text2);text-align:center;line-height:1.7;margin-bottom:20px;}
.modal-btns{display:flex;flex-direction:column;gap:8px;}
.modal-btn-main{width:100%;background:var(--sage);color:#fff;border:none;border-radius:var(--r-md);padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.modal-btn-sec{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;font-size:13px;cursor:pointer;font-family:inherit;}
.about-block{background:var(--sand-l);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;}
.about-title{font-size:14px;font-weight:500;color:var(--sand-t);margin-bottom:6px;}
.about-body{font-size:13px;color:var(--sand-t);line-height:1.8;opacity:.85;}
.slot-hint{font-size:11px;padding:5px 8px;border-radius:6px;margin-top:4px;}
.slot-hint.ok{background:var(--sage-l);color:var(--sage-t);}
.slot-hint.warn{background:#faeeda;color:#854f0b;}
.slot-hint.full{background:#fce8e8;color:#a32d2d;}
.bind-notice{border:0.5px solid var(--border);border-radius:var(--r-lg);padding:20px 16px;text-align:center;margin-bottom:14px;}
.bind-notice p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px;}
.note-tog{display:inline-flex;align-items:center;gap:5px;cursor:pointer;background:transparent;border:none;font-family:inherit;color:var(--text2);font-size:12px;margin-bottom:8px;padding:0;}
.note-ico{width:16px;height:16px;border-radius:4px;background:var(--sage-l);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--sage-t);}
.note-field{display:none;margin-bottom:8px;}.note-field.show{display:block;}
.child-static{font-size:13px;padding:8px 10px;background:var(--sage-l);border-radius:var(--r-md);color:var(--sage-t);margin-bottom:10px;}
.success-box{text-align:center;padding:14px 0 8px;}
.ok-icon{font-size:26px;margin-bottom:6px;}
.ok-msg{font-size:14px;font-weight:500;margin-bottom:3px;}
.ok-sub{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
.reg-toggle-btn{font-size:12px;color:var(--sage);background:var(--sage-l);border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;margin-left:8px;}
.reg-form-wrap{display:none;margin-top:10px;}.reg-form-wrap.show{display:block;}
.cb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cb{width:14px;height:14px;accent-color:var(--sage);cursor:pointer;}
.sch-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.sch-item{background:var(--bg2);border-radius:var(--r-md);padding:9px 10px;}
.sch-day{font-size:11px;color:var(--text2);margin-bottom:2px;}
.sch-time{font-size:12px;font-weight:500;color:var(--text);}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-radius:var(--r-md);margin-bottom:6px;}
.price-item.feat{background:var(--sage-l);}
.p-name{font-size:13px;font-weight:500;}.p-name.feat{color:var(--sage-t);}
.p-sub{font-size:11px;color:var(--text2);}
.p-price{font-size:15px;font-weight:500;}.p-price.feat{color:var(--sage);}
.badge-sm{font-size:10px;background:var(--sage);color:#fff;border-radius:3px;padding:1px 5px;margin-left:4px;vertical-align:middle;}
.pay-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);}
.pay-row:last-child{border-bottom:none;}
.pay-ico{width:26px;height:26px;background:var(--bg2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.reg-item{border:0.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.ri-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.ri-title{font-size:13px;font-weight:500;}
.ri-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.ri-actions{display:flex;gap:8px;margin-top:8px;}
.ri-btn{font-size:11px;color:var(--sage);background:transparent;border:0.5px solid var(--sage-m);border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit;}
.ri-btn.red{color:#a32d2d;border-color:#f09595;}
</style>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw6PBIUdHTzKBBdbQbRcU-za2rJQtBL6ZEjvJI6z1-NN1ziW1gjTafSdcx8U0E_eRHR/exec";

/**
 * 查詢 Notion（GET proxy）
 * GAS 的 doGet 接收 ?action=query&db=...&filter=...
 */
async function proxyQuery(dbId, filter = null, sorts = null) {
  const params = new URLSearchParams({ action: "query", db: dbId });
  if (filter) params.set("filter", JSON.stringify(filter));
  if (sorts)  params.set("sorts",  JSON.stringify(sorts));
  const res = await fetch(`${GAS_URL}?${params}`, { credentials: 'omit' });
  if (!res.ok) throw new Error("GAS 回應錯誤 " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "查詢失敗");
  return data.results || [];
}

/**
 * 寫入 Notion（POST proxy）
 * GAS 的 doPost 接收 {source:"admin", action:"create/update/delete", ...}
 */
async function proxyPost(action, payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    credentials: "omit",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ source: "admin", action, ...payload }),
  });
  if (!res.ok) throw new Error("GAS 回應錯誤 " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "操作失敗");
  return data.result;
}

/**
 * 公開網站專用 action（報名、取消等）
 * GAS doPost 需要加對應的 handler（見下方新增的 GAS 程式碼）
 */
async function proxyAction(action, payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    credentials: "omit",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ source: "public", action, ...payload }),
  });
  if (!res.ok) throw new Error("GAS 回應錯誤 " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "操作失敗");
  return data;
}

/**
 * 批次查詢（一次回傳多筆資料，減少 HTTP 來回次數）
 */
async function proxyBatch(action, params = {}) {
  const urlParams = new URLSearchParams({ action, ...params });
  const res = await fetch(`${GAS_URL}?${urlParams}`, { credentials: "omit" });
  if (!res.ok) throw new Error("GAS 回應錯誤 " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "查詢失敗");
  return data;
}

// ── 日期工具 ─────────────────────────────────────────────────
function today() {
  return new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}
function daysLater(n) {
  const d = new Date(); d.setDate(d.getDate() + n);
  return d.toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
}
function formatDate(str) {
  if (!str) return "";
  const dateStr = str.includes("T") ? str : str + "T00:00:00+08:00";
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return str;
  const w = ["日","一","二","三","四","五","六"];
  return `${d.getMonth()+1}/${d.getDate()}（週${w[d.getDay()]}）`;
}
function calcAge(b) {
  if (!b) return "";
  const bd = new Date(b + "T00:00:00+08:00"), n = new Date();
  let y = n.getFullYear()-bd.getFullYear(), m = n.getMonth()-bd.getMonth();
  if (m<0){y--;m+=12;} if(n.getDate()<bd.getDate())m--;if(m<0){y--;m+=11;}
  return `${y}歲${m}個月`;
}

// ── 家長身份識別（URL param → localStorage）────────────────
function getLineUID() { return localStorage.getItem("sy_line_uid") || null; }
function setLineUID(uid) { localStorage.setItem("sy_line_uid", uid); }

// URL 參數優先（GAS 綁定後 redirect 帶入 / 測試用）
(function initUIDFromURL() {
  const u = new URLSearchParams(location.search).get("uid");
  if (u) setLineUID(u);
})();

// 導航連結自動帶上 uid 參數
function updateNavLinks() {
  const uid = getLineUID();
  if (!uid) return;
  document.querySelectorAll("#nav-links a.nl").forEach(a => {
    const href = a.getAttribute("href");
    if (href && !href.startsWith("http") && !href.includes("uid=")) {
      a.href = href + (href.includes("?") ? "&" : "?") + "uid=" + encodeURIComponent(uid);
    }
  });
}

const cancelPropsMap = {};
const LIFF_URL = "https://liff.line.me/2009732717-1xMSvGEl";

document.addEventListener("DOMContentLoaded", async ()=>{

  const oaUrl = localStorage.getItem("sy_line_oa_url") || "https://lin.ee/uBSHQQb";
  document.getElementById("line-link").href = oaUrl;

  if (!lineUID) {
    // LINE 瀏覽器內：暫存跳轉目標，跳到 LIFF 取得身份後自動回來

      window.location.replace(LIFF_URL);
      return;

    document.getElementById("v-unbound").style.display="";
    document.getElementById("liff-open-btn").href = LIFF_URL;

  document.getElementById("v-bound").style.display="";
  await loadRegList();
});

      loadEl.style.display="none";
      emptyEl.innerHTML='請先綁定小朋友，完成綁定後就能開始報名囉！<br><br><button class="btn-main" style="max-width:200px;margin:0 auto;display:block;" onclick="location.href=\'children.html?uid='+lineUID+'\'">去綁定</button>';
      emptyEl.style.display="";
      return;
    }

    const childIds=new Set(myChildren.map(c=>c.id));
    const childNameMap={};
    myChildren.forEach(c=>{ childNameMap[c.id]=c.properties["暱稱"]?.title?.[0]?.text?.content||""; });

    const futureSess=data.sessions||[];
    const themes=data.themes||[];
    const mySess=futureSess.filter(s=>(s.properties["出席孩子"]?.relation||[]).some(r=>childIds.has(r.id)));
    const myThemes=themes.filter(t=>{
      const list=t.properties["報名名單"]?.rich_text?.[0]?.text?.content||"";
      return [...childIds].some(id=>list.includes(childNameMap[id]));
    });

    loadEl.style.display="none";
    if(mySess.length===0&&myThemes.length===0) { emptyEl.style.display=""; return; }

    // 判斷「是否已過期」：日期 < 今天就不能取消
    const todayStr = new Date().toLocaleDateString("sv-SE", { timeZone: "Asia/Taipei" });
    const isPast = (d) => d && d < todayStr;

    // 主題課程報名
    myThemes.forEach(t=>{
      const name=t.properties["課程名稱"]?.title?.[0]?.text?.content||"";
      const dStr=t.properties["日期時間"]?.date?.start||"";
      const deduct=t.properties["扣除堂數"]?.number||1;
      const listR=t.properties["報名名單"]?.rich_text?.[0]?.text?.content||"";
      const myNames=[...childIds].map(id=>childNameMap[id]).filter(n=>listR.includes(n));
      const newListR=listR.split(/[、, \n]+/).filter(n=>n.trim()&&!myNames.includes(n.trim())).join("、");
      cancelPropsMap[t.id]={"報名名單":{rich_text:[{text:{content:newListR}}]}};
      const past = isPast((dStr||"").slice(0,10));
      const btnHtml = past
        ? `<button class="ri-btn red" disabled title="已開始/結束的課程無法取消" style="opacity:.45;cursor:not-allowed;">已結束</button>`
        : `<button class="ri-btn red" onclick="showCancel('${t.id}','${name}','${myNames.join("、")}')">取消報名</button>`;
      const item=document.createElement("div"); item.className="reg-item";
      item.innerHTML=`<div class="ri-head">
        <div class="ri-title">${dStr?formatDate(dStr)+"　":""}${name}</div>
        <span class="tag rose">主題課程</span></div>
        <div class="ri-sub">孩子：${myNames.join("、")} · 扣 ${deduct} 堂</div>
        <div class="ri-actions">${btnHtml}</div>`;
      listEl.appendChild(item);
    });

    // 常態課程
    mySess.sort((a,b)=>(a.properties["日期"]?.date?.start||"").localeCompare(b.properties["日期"]?.date?.start||""));
    mySess.forEach(s=>{
      const dStr=s.properties["日期"]?.date?.start||"";
      const slot=s.properties["時段"]?.rich_text?.[0]?.text?.content||"";
      const deduct=s.properties["扣除堂數"]?.number||1;
      const myKidsRel=s.properties["出席孩子"]?.relation||[];
      const myKids=myKidsRel.filter(r=>childIds.has(r.id)).map(r=>childNameMap[r.id]||"");
      const newKidsRel=myKidsRel.filter(r=>!childIds.has(r.id));
      cancelPropsMap[s.id]={"出席孩子":{relation:newKidsRel}};
      const past = isPast((dStr||"").slice(0,10));
      const btnHtml = past
        ? `<button class="ri-btn red" disabled title="已開始/結束的課程無法取消" style="opacity:.45;cursor:not-allowed;">已結束</button>`
        : `<button class="ri-btn red" onclick="showCancel('${s.id}','${formatDate(dStr)}','${myKids.join("、")}')">取消報名</button>`;
      const item=document.createElement("div"); item.className="reg-item";
      item.innerHTML=`<div class="ri-head">
        <div class="ri-title">${formatDate(dStr)}　一般課程</div>
        <span class="tag sage">常態課程</span></div>
        <div class="ri-sub">孩子：${myKids.join("、")} · ${slot} · 扣 ${deduct} 堂</div>
        <div class="ri-actions">${btnHtml}</div>`;
      listEl.appendChild(item);
    });
  } catch(e) { loadEl.textContent="⚠ 載入失敗："+e.message; }
}

function showCancel(id,label,names) {
  pendingCancel={id,names};
  document.getElementById("cancel-desc").textContent=`確定要取消「${label}」的報名嗎？（${names}）`;
  document.getElementById("cancelModal").classList.add("show");
}
function closeModal() { document.getElementById("cancelModal").classList.remove("show"); pendingCancel=null; }
async function confirmCancel() {
  if(!pendingCancel) return;
  const props = cancelPropsMap[pendingCancel.id];
  closeModal();
  try {
    await proxyAction("update",{pageId:pendingCancel.id,properties:props});
    document.getElementById("reg-list").innerHTML="";
    document.getElementById("reg-loading").style.display="";
    document.getElementById("reg-loading").textContent="載入中…";
    await loadRegList();
  } catch(e) { alert("取消失敗："+e.message); }
}
</script>
</body>
</html>
