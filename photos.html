<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>課程照片 · SY 兒童手作教室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sage:#9AAF9F;--sage-l:#E3EDE5;--sage-m:#B5C9BA;--sage-t:#3A5440;
  --rose:#C4A29E;--rose-l:#EFE4E2;--rose-t:#6B4845;
  --sand:#C2B49A;--sand-l:#EDE6DB;--sand-t:#5C4E38;
  --clay:#9AAF9F;
  --bg:#fff;--bg2:#f8f7f5;--border:rgba(0,0,0,0.1);
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#aaa;
  --r-md:8px;--r-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}
.page{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;}
.nav-title{font-size:13px;font-weight:500;}
.nav-links{display:flex;gap:14px;}
.nl{font-size:13px;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:inherit;padding:0;text-decoration:none;display:inline-block;}
.nl.on{color:var(--sage);font-weight:500;border-bottom:1.5px solid var(--sage);padding-bottom:1px;}

/* Child tabs */
.child-tabs{display:flex;gap:0;overflow-x:auto;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:42px;z-index:90;padding:0 16px;scrollbar-width:none;}
.child-tabs::-webkit-scrollbar{display:none;}
.ctab{flex-shrink:0;padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:inherit;border-bottom:2px solid transparent;white-space:nowrap;}
.ctab.on{color:var(--sage);font-weight:500;border-bottom-color:var(--sage);}

/* Sections */
.sec{padding:0 16px 24px;}
.month-head{font-size:11px;font-weight:500;color:var(--sand);letter-spacing:.08em;padding:16px 0 8px;text-transform:uppercase;}

/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.photo-item{position:relative;aspect-ratio:1;background:var(--bg2);border-radius:4px;overflow:hidden;cursor:pointer;}
.photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .2s;}
.photo-item:active img{opacity:.85;}
.photo-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.45));padding:4px 5px 3px;font-size:9px;color:#fff;line-height:1.2;}

/* Loading / Empty */
.loading{text-align:center;padding:40px 20px;font-size:13px;color:var(--text3);}
.empty-box{text-align:center;padding:48px 20px;}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-msg{font-size:14px;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--text3);}

/* Unbound view */
.line-block{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#06C755;border-radius:var(--r-lg);margin:16px;}
.line-txt strong{display:block;font-size:13px;color:#fff;font-weight:500;margin-bottom:3px;}
.line-txt span{font-size:11px;color:rgba(255,255,255,.8);}
.btn-line{background:#fff;color:#06C755;border:none;border-radius:var(--r-md);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;}

/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
.lb.show{display:flex;}
.lb-img{max-width:96vw;max-height:80vh;object-fit:contain;border-radius:8px;}
.lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:24px;cursor:pointer;background:none;border:none;line-height:1;padding:4px;}
.lb-nav{display:flex;align-items:center;gap:20px;margin-top:14px;}
.lb-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-btn:disabled{opacity:.3;}
.lb-info{color:rgba(255,255,255,.7);font-size:12px;text-align:center;}
.lb-counter{color:#fff;font-size:13px;}
</style>
</head>
<body>
<div class="page">

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-logo">
      <img src="images/logo.png" alt="SY" style="width:28px;height:28px;object-fit:contain;border-radius:6px;">
      <span class="nav-title">SY 兒童手作教室</span>
    </div>
    <div class="nav-links" id="nav-links">
      <a class="nl" href="index.html">首頁</a>
      <a class="nl" href="register.html">報名</a>
      <a class="nl" href="children.html">孩子</a>
      <a class="nl on" href="photos.html">相簿</a>
    </div>
  </nav>

  <!-- Child tabs (dynamic) -->
  <div class="child-tabs" id="child-tabs" style="display:none;"></div>

  <!-- VIEW: 未綁定 -->
  <div id="v-unbound" style="display:none;padding:16px;">
    <div style="text-align:center;padding:32px 0 20px;">
      <div style="font-size:40px;margin-bottom:12px;">📸</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:6px;">查看孩子的課程照片</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:24px;">請先透過 LINE 綁定帳號，<br>即可查看孩子的所有上課照片。</div>
    </div>
    <a class="line-block" id="line-link" href="https://lin.ee/uBSHQQb" target="_blank" style="text-decoration:none;">
      <div style="width:40px;height:40px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">💬</div>
      <div class="line-txt">
        <strong>掃碼加入 LINE OA</strong>
        <span>加入後輸入「綁定 孩子名字 生日」</span>
      </div>
    </a>
    <a id="liff-open-btn" href="#" style="display:block;text-align:center;margin-top:8px;">
      <button class="btn-line" style="background:var(--sage);color:#fff;">在 LINE 中開啟</button>
    </a>
  </div>

  <!-- VIEW: 已綁定 -->
  <div id="v-bound" style="display:none;">
    <div class="loading" id="photos-loading">載入中…</div>
    <div id="photos-content" style="display:none;"></div>
    <div id="photos-empty" style="display:none;">
      <div class="empty-box">
        <div class="empty-icon">🖼️</div>
        <div class="empty-msg">還沒有照片唷！</div>
        <div class="empty-sub" style="margin-bottom:16px;">上課後老師會新增照片</div>
        <a href="index.html" id="empty-register-btn"
           style="display:inline-block;padding:10px 22px;background:var(--sage);color:#fff;font-size:13px;font-weight:500;border-radius:999px;text-decoration:none;">
          報名課程
        </a>
      </div>
    </div>
  </div>

</div><!-- /page -->

<!-- Lightbox -->
<div class="lb" id="lightbox">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-nav">
    <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <span class="lb-counter" id="lb-counter"></span>
    <button class="lb-btn" id="lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div class="lb-info" id="lb-info"></div>
</div>

<script>
// ============================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbw6PBIUdHTzKBBdbQbRcU-za2rJQtBL6ZEjvJI6z1-NN1ziW1gjTafSdcx8U0E_eRHR/exec";
const LIFF_URL = "https://liff.line.me/2009732717-1xMSvGEl";
// ============================================================

// ── UID 工具 ─────────────────────────────────────────────────
function getLineUID() { return localStorage.getItem("sy_line_uid") || null; }
function setLineUID(uid) { localStorage.setItem("sy_line_uid", uid); }

(function initUIDFromURL() {
  const u = new URLSearchParams(location.search).get("uid");
  if (u) setLineUID(u);
})();

function updateNavLinks() {
  const uid = getLineUID();
  if (!uid) return;
  document.querySelectorAll("#nav-links a.nl").forEach(a => {
    const href = a.getAttribute("href");
    if (href && !href.startsWith("http") && !href.includes("uid=")) {
      a.href = href + (href.includes("?") ? "&" : "?") + "uid=" + encodeURIComponent(uid);
    }
  });
}

// ── GAS Proxy ────────────────────────────────────────────────
async function proxyQuery(dbId, filter = null, sorts = null) {
  const params = new URLSearchParams({ action: "query", db: dbId });
  if (filter) params.set("filter", JSON.stringify(filter));
  if (sorts)  params.set("sorts",  JSON.stringify(sorts));
  const res = await fetch(`${GAS_URL}?${params}`, { credentials: "omit" });
  if (!res.ok) throw new Error("GAS 回應錯誤 " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "查詢失敗");
  return data.results || [];
}

async function proxyBatch(action, params = {}) {
  const urlParams = new URLSearchParams({ action, ...params });
  const res = await fetch(`${GAS_URL}?${urlParams}`, { credentials: "omit" });
  if (!res.ok) throw new Error("GAS 回應錯誤 " + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "查詢失敗");
  return data;
}

// ── 日期工具 ─────────────────────────────────────────────────
function fmtDate(str) {
  if (!str) return "";
  const dateStr = str.includes("T") ? str : str + "T00:00:00+08:00";
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return str;
  const w = ["日","一","二","三","四","五","六"];
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（週${w[d.getDay()]}）`;
}
function fmtMonthHead(str) {
  if (!str) return "";
  const d = new Date(str.includes("T") ? str : str + "T00:00:00+08:00");
  if (isNaN(d.getTime())) return str;
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月`;
}
function getImgUrl(url) {
  if (!url) return "";
  const match = url.match(/id=([^&]+)/) || url.match(/\/d\/([^/]+)/);
  if (match) return `https://lh3.googleusercontent.com/d/${match[1]}=w600`;
  return url;
}

// ── 全域狀態 ─────────────────────────────────────────────────
let lineUID = getLineUID();
let allPhotos = [];      // 目前顯示孩子的所有照片（帶有課程日期）
let currentChild = null; // 目前選中孩子
let lbPhotos = [];       // lightbox 照片列表（含 url + info）
let lbIdx = 0;

// ── 初始化 ───────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", async () => {
  updateNavLinks();
  const oaUrl = localStorage.getItem("sy_line_oa_url") || "https://lin.ee/uBSHQQb";
  document.getElementById("line-link").href = oaUrl;

  if (!lineUID) {
    if (/Line/i.test(navigator.userAgent)) {
      localStorage.setItem("sy_liff_redirect", "photos");
      window.location.replace(LIFF_URL);
      return;
    }
    document.getElementById("v-unbound").style.display = "";
    document.getElementById("liff-open-btn").href = LIFF_URL;
    return;
  }
  document.getElementById("v-bound").style.display = "";
  loadAlbum();
});

async function loadAlbum() {
  try {
    // 取得家長 + 孩子
    const batchData = await proxyBatch("getMyChildren", { uid: lineUID });
    const children = batchData.children || [];

    document.getElementById("photos-loading").style.display = "none";

    if (children.length === 0) {
      document.getElementById("photos-empty").style.display = "";
      return;
    }

    // 建立孩子 Tab
    const tabsEl = document.getElementById("child-tabs");
    tabsEl.style.display = "";
    children.forEach((c, i) => {
      const name = c.properties["暱稱"]?.title?.[0]?.text?.content || "孩子" + (i+1);
      const tab = document.createElement("button");
      tab.className = "ctab" + (i === 0 ? " on" : "");
      tab.textContent = name;
      tab.onclick = () => switchChild(c, tab);
      tabsEl.appendChild(tab);
    });

    // 顯示第一位孩子的照片
    switchChild(children[0], tabsEl.querySelector(".ctab"));

  } catch (e) {
    document.getElementById("photos-loading").textContent = "⚠ 載入失敗：" + e.message;
  }
}

async function switchChild(child, tabEl) {
  // 更新 Tab 樣式
  document.querySelectorAll(".ctab").forEach(t => t.classList.remove("on"));
  if (tabEl) tabEl.classList.add("on");

  currentChild = child;
  const childName = child.properties["暱稱"]?.title?.[0]?.text?.content || "";
  const contentEl = document.getElementById("photos-content");
  const emptyEl = document.getElementById("photos-empty");

  contentEl.innerHTML = `<div class="loading">載入 ${childName} 的照片…</div>`;
  contentEl.style.display = "";
  emptyEl.style.display = "none";

  try {
    // 查詢此孩子的照片（優先用「關聯孩子」relation，回退到「照片分類」Select）
    let photos = [];
    try {
      photos = await proxyQuery(
        "NOTION_DB_PHOTO",
        { property: "關聯孩子", relation: { contains: child.id } }
      );
    } catch (e1) {
      // 若 Notion DB 尚未建立「關聯孩子」欄位，退回舊邏輯
      photos = await proxyQuery(
        "NOTION_DB_PHOTO",
        { property: "照片分類", select: { equals: childName } }
      );
    }

    // 同時查詢 Session 以取得日期
    const sessionIds = [...new Set(
      photos.map(p => p.properties["關聯課程"]?.relation?.[0]?.id).filter(Boolean)
    )];

    // 建立 sessionId → 日期 的 Map（批次查詢，最多取近100堂）
    const sessionDateMap = {};
    if (sessionIds.length > 0) {
      const sessions = await proxyQuery("NOTION_DB_SESSION", null,
        [{ property: "日期", direction: "descending" }]);
      sessions.forEach(s => { sessionDateMap[s.id] = s.properties["日期"]?.date?.start || ""; });
    }

    contentEl.innerHTML = "";

    if (photos.length === 0) {
      emptyEl.style.display = "";
      contentEl.style.display = "none";
      return;
    }

    // 依月份分組
    const groups = {}; // "YYYY年M月" → [photo]
    lbPhotos = [];

    photos.forEach(p => {
      const url = p.properties["Google Drive URL"]?.url || "";
      if (!url) return;
      const sessId = p.properties["關聯課程"]?.relation?.[0]?.id || "";
      const dateStr = sessionDateMap[sessId] || "";
      const monthKey = fmtMonthHead(dateStr) || "未知日期";
      if (!groups[monthKey]) groups[monthKey] = [];
      groups[monthKey].push({ url, dateStr, photoId: p.id });
      lbPhotos.push({ url, dateStr, childName });
    });

    const sec = document.createElement("div");
    sec.className = "sec";

    Object.entries(groups).forEach(([month, items]) => {
      const mHead = document.createElement("div");
      mHead.className = "month-head";
      mHead.textContent = month;
      sec.appendChild(mHead);

      const grid = document.createElement("div");
      grid.className = "photo-grid";

      items.forEach((item, i) => {
        const lbIndex = lbPhotos.findIndex(x => x.photoId === item.photoId || x.url === item.url);
        const dispUrl = getImgUrl(item.url);
        const cell = document.createElement("div");
        cell.className = "photo-item";
        cell.onclick = () => openLb(lbIndex >= 0 ? lbIndex : i);
        cell.innerHTML = `
          <img src="${dispUrl}" loading="lazy" alt="${childName}"
               onerror="this.style.display='none';this.parentElement.style.background='var(--bg2)'">
          ${item.dateStr ? `<div class="photo-date">${fmtDate(item.dateStr)}</div>` : ""}
        `;
        grid.appendChild(cell);
      });

      sec.appendChild(grid);
    });

    contentEl.appendChild(sec);

  } catch (e) {
    console.error("載入照片失敗：", e);
    // 查詢失敗時也顯示空狀態（避免單一欄位名錯誤就整頁壞掉）
    contentEl.style.display = "none";
    emptyEl.style.display = "";
  }
}

// ── Lightbox ─────────────────────────────────────────────────
function openLb(idx) {
  lbIdx = idx;
  showLbPhoto();
  document.getElementById("lightbox").classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeLb() {
  document.getElementById("lightbox").classList.remove("show");
  document.body.style.overflow = "";
}

function showLbPhoto() {
  const p = lbPhotos[lbIdx];
  if (!p) return;
  document.getElementById("lb-img").src = getImgUrl(p.url);
  document.getElementById("lb-counter").textContent = `${lbIdx + 1} / ${lbPhotos.length}`;
  document.getElementById("lb-info").textContent = p.dateStr ? fmtDate(p.dateStr) : "";
  document.getElementById("lb-prev").disabled = lbIdx === 0;
  document.getElementById("lb-next").disabled = lbIdx === lbPhotos.length - 1;
}

function lbNav(dir) {
  const newIdx = lbIdx + dir;
  if (newIdx < 0 || newIdx >= lbPhotos.length) return;
  lbIdx = newIdx;
  showLbPhoto();
}

// 鍵盤操作
document.addEventListener("keydown", e => {
  if (!document.getElementById("lightbox").classList.contains("show")) return;
  if (e.key === "ArrowLeft") lbNav(-1);
  if (e.key === "ArrowRight") lbNav(1);
  if (e.key === "Escape") closeLb();
});

// 觸控滑動（左右滑動切換照片）
let tsX = 0;
document.getElementById("lightbox").addEventListener("touchstart", e => { tsX = e.touches[0].clientX; });
document.getElementById("lightbox").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tsX;
  if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
});
</script>
</body>
</html>
